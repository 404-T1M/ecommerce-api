CreateCategoryRequest:
  type: object
  required:
    - nameEn
    - nameAr
    - descriptionEn
    - descriptionAr
    - order
    - categoryImage
  properties:
    nameEn:
      type: string
      example: Electronics
    nameAr:
      type: string
      example: إلكترونيات
    descriptionEn:
      type: string
      example: Electronics and devices
    descriptionAr:
      type: string
      example: الإلكترونيات والأجهزة
    parent:
      type: string
      description: Parent category ID (optional).
      example: 65b1f0a2f7a1c2d3e4f5a111
    order:
      type: integer
      example: 1
    published:
      type: boolean
      example: true
    isFeatured:
      type: boolean
      example: false
    categoryImage:
      type: string
      format: binary
      description: Category icon image file.

CreateCategoryResponse:
  type: object
  properties:
    message:
      type: string
      example: Category Created Successfully
    category:
      $ref: "#/CategoryData"

UpdateCategoryRequest:
  type: object
  properties:
    nameEn:
      type: string
      example: Electronics
    nameAr:
      type: string
      example: إلكترونيات
    descriptionEn:
      type: string
      example: Updated description
    descriptionAr:
      type: string
      example: وصف محدث
    parent:
      type: string
      description: Parent category ID (optional).
      example: 65b1f0a2f7a1c2d3e4f5a111
    isFeatured:
      type: boolean
      example: true
    categoryImage:
      type: string
      format: binary
      description: Category icon image file (optional).

UpdateCategoryResponse:
  type: object
  properties:
    message:
      type: string
      example: Category Updated Successfully
    category:
      $ref: "#/CategoryData"

CategoryData:
  type: object
  properties:
    id:
      type: string
      example: 65b1f0a2f7a1c2d3e4f5a222
    name:
      type: object
      properties:
        en:
          type: string
          example: Electronics
        ar:
          type: string
          example: إلكترونيات
    slug:
      type: string
      example: electronics
    description:
      type: object
      properties:
        en:
          type: string
          example: Electronics and devices
        ar:
          type: string
          example: الإلكترونيات والأجهزة
    parent:
      type: string
      nullable: true
      example: 65b1f0a2f7a1c2d3e4f5a111
    order:
      type: integer
      example: 1
    published:
      type: boolean
      example: true
    image:
      type: object
      properties:
        fileName:
          type: string
          example: categories/abc123
        imageSize:
          type: integer
          example: 24567
        imageUrl:
          type: string
          example: https://res.cloudinary.com/xxx/image/upload/...
    isFeatured:
      type: boolean
      example: false
    createdBy:
      type: string
      example: 65b1f0a2f7a1c2d3e4f5a333
    createdAt:
      type: string
      format: date-time
      example: "2026-02-04T12:00:00.000Z"

CreateProductRequest:
  type: object
  required:
    - nameEn
    - nameAr
    - descriptionEn
    - descriptionAr
    - category
    - originalPrice
    - salePrice
    - productImages
  properties:
    nameEn:
      type: string
      example: iPhone 15
    nameAr:
      type: string
      example: ايفون 15
    descriptionEn:
      type: string
      example: Latest iPhone
    descriptionAr:
      type: string
      example: أحدث آيفون
    category:
      type: string
      example: 65b1f0a2f7a1c2d3e4f5a111
    originalPrice:
      type: number
      example: 1200
    salePrice:
      type: number
      example: 1100
    discountType:
      type: string
      enum: [percentage, fixed]
      example: percentage
    discountValue:
      type: number
      example: 10
    stock:
      type: integer
      example: 50
    attributes:
      type: array
      items:
        $ref: "#/ProductAttributeInput"
    productImages:
      type: array
      items:
        type: string
        format: binary
      description: Product images files.

UpdateProductRequest:
  type: object
  properties:
    nameEn:
      type: string
    nameAr:
      type: string
    descriptionEn:
      type: string
    descriptionAr:
      type: string
    category:
      type: string
    originalPrice:
      type: number
    salePrice:
      type: number
    discountType:
      type: string
      enum: [percentage, fixed]
    discountValue:
      type: number
    stock:
      type: integer
    attributes:
      type: array
      items:
        $ref: "#/ProductAttributeInput"
    productImages:
      type: array
      items:
        type: string
        format: binary

ProductAttributeInput:
  type: object
  required:
    - attributeId
    - value
  properties:
    attributeId:
      type: string
    value:
      oneOf:
        - type: string
        - type: number
        - type: boolean

ProductImage:
  type: object
  properties:
    fileName:
      type: string
      example: products/abc123
    imageSize:
      type: integer
      example: 24567
    imageUrl:
      type: string
      example: https://res.cloudinary.com/xxx/image/upload/...

ProductPrice:
  type: object
  properties:
    originalPrice:
      type: number
      example: 1200
    salePrice:
      type: number
      example: 1100
    finalPrice:
      type: number
      example: 990

ProductDiscount:
  type: object
  properties:
    discountType:
      type: string
      enum: [percentage, fixed]
      example: percentage
    discountValue:
      type: number
      example: 10

ProductAttribute:
  type: object
  properties:
    attribute:
      type: string
    nameSnapshot:
      type: object
      properties:
        en:
          type: string
        ar:
          type: string
    typeSnapshot:
      type: string
      enum: [text, number, select, boolean]
    value:
      oneOf:
        - type: string
        - type: number
        - type: boolean

ProductData:
  type: object
  properties:
    id:
      type: string
      example: 65b1f0a2f7a1c2d3e4f5a777
    name:
      type: object
      properties:
