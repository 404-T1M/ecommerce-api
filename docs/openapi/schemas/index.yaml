    published:
      type: boolean
      example: false
    sku:
      type: string
      example: PRD-ABC123
    stock:
      type: integer
      example: 50
    createdBy:
      type: string
      example: 65b1f0a2f7a1c2d3e4f5a333
    createdAt:
      type: string
      format: date-time
      example: "2026-02-04T12:00:00.000Z"

