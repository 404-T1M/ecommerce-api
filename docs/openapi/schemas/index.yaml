      example: Reset Password Link Was Send Successfully Check Your Email

ResetPasswordRequest:
  type: object
  required:
    - password
    - confirmPassword
  properties:
    password:
      type: string
      format: password
      example: "NewP@ssw0rd!"
    confirmPassword:
      type: string
      format: password
      example: "NewP@ssw0rd!"

ResetPasswordResponse:
  type: object
  properties:
    message:
      type: string
      example: Password Changed Successfully

