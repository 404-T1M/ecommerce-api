adminUpdateProduct:
  patch:
    summary: Update product
    tags:
      - Products
    security:
      - bearerAuth: []
    parameters:
      - name: productId
        in: path
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            $ref: "../schemas/index.yaml#/UpdateProductRequest"
          examples:
            sample:
              value:
                nameEn: iPhone 15 Pro
                nameAr: ايفون 15 برو
                descriptionEn: Updated description
                descriptionAr: وصف محدث
                salePrice: 1000
                discountType: fixed
                discountValue: 50
                stock: 40
    responses:
      "200":
        description: OK
        content:
          application/json:
            schema:
              $ref: "../schemas/index.yaml#/UpdateProductResponse"
            examples:
              sample:
                value:
                  message: Product Updated Successfully
                  product:
                    id: 65b1f0a2f7a1c2d3e4f5a777
                    name:
                      en: iPhone 15 Pro
                      ar: ايفون 15 برو
                    description:
                      en: Updated description
                      ar: وصف محدث
                    image:
                      fileName: products/abc123
                      imageSize: 24567
                      imageUrl: https://res.cloudinary.com/xxx/image/upload/...
                    category: 65b1f0a2f7a1c2d3e4f5a111
                    price:
                      originalPrice: 1200
                      salePrice: 1000
                      finalPrice: 950
                    discountPrice:
                      discountType: fixed
                      discountValue: 50
                    published: false
                    sku: PRD-ABC123
                    stock: 40
                    createdBy: 65b1f0a2f7a1c2d3e4f5a333
                    createdAt: "2026-02-04T12:00:00.000Z"
      "400":
        description: Bad Request
        content:
          application/json:
            schema:
              $ref: "../schemas/index.yaml#/ErrorResponse"
            examples:
              invalid_attribute:
                value:
                  status: fail
                  message: Invalid attribute
              attribute_not_allowed:
                value:
                  status: fail
